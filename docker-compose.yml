services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: longcarebot
      POSTGRES_USER: longcarebot
      POSTGRES_PASSWORD: longcarebot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U longcarebot -d longcarebot"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build: .
    command: uvicorn app.agent_service:app --host 0.0.0.0 --port 8001
    environment:
      DATABASE_URL: postgresql://longcarebot:longcarebot@postgres:5432/longcarebot
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://longcarebot:longcarebot@postgres:5432/longcarebot
      AGENT_URL: http://agent:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
